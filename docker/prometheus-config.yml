# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'url-shortener'
    environment: 'development'

# remote_write disabled for local dev - use Grafana Cloud Metrics Endpoint integration for production
# remote_write:
#   - url: "https://prometheus-prod-43-prod-ap-south-1.grafana.net/api/prom/push"
#     basic_auth:
#       username: "3291100"
#       password: "YOUR_API_TOKEN"

scrape_configs:
  # Prometheus scrapes itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape metrics from FastAPI application
  - job_name: 'url-shortener'
    static_configs:
      - targets: ['host.docker.internal:8000']  # FastAPI metrics port
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape Jaeger metrics
  - job_name: 'jaeger'
    static_configs:
      - targets: ['localhost:14269']
    scrape_interval: 15s

  # Scrape Redis (if redis_exporter is running)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
