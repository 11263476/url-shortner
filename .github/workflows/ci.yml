name: CI

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkforge_user
          POSTGRES_PASSWORD: linkforge_password
          POSTGRES_DB: linkforge_db
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend lint
        working-directory: backend
        run: |
          pip install --upgrade pip hatchling
          pip install .[dev]
          ruff check src/ --exit-zero
          mypy src/

      - name: Backend unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://linkforge_user:linkforge_password@localhost:5432/linkforge_db
        run: |
          python -m alembic upgrade head
          python -m pytest tests/ -v --timeout=60 -m "not integration"

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Frontend test
        working-directory: frontend
        run: npm run test

      - name: Frontend build
        working-directory: frontend
        run: npm run build
